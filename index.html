<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Gift</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="step1" class="card">
        <h2 id="gift-hint">Take your gift 🎁</h2>
        <div id="gift" class="gift-container" onclick="moveGift()">🎁</div>
    </div>

    <div id="step2" class="card hidden">
        <div class="scary-text">Did you actually think there was a gift? 🤔</div>
        <button class="btn" onclick="nextStep(3)">Next</button>
    </div>

    <div id="step3" class="card hidden">
        <div class="scary-text">I'm too poor for that, ngl 😞</div>
        <button class="btn" onclick="nextStep(4)">Next</button>
    </div>

    <div id="step4" class="card hidden">
        <div class="scary-text">So I made this for you 😀</div>
        <button class="btn" onclick="nextStep(5)">Next</button>
    </div>

    <div id="step5" class="card hidden">
        <div class="scary-text">meh anyways...</div>
        <button class="btn" onclick="nextStep(6)">Click here ✨</button>
    </div>

    <div id="step6" class="card final-card hidden">
        <h1>HAPPY BIRTHDAY OR IDK!!! 🎉🎉🎉🎉💟</h1>
        <h2>كل عام وأنت بخير! ✨</h2>
        <p>أتمنى لك عاماً سعيداً ومليئاً بكل الأشياء الجميلة.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
